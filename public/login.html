<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>loginVivaio</title>
    <link rel="stylesheet" href="./style/stile.css">
    <script src="./script/script.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/index" class="logo">
            <img src="/img/logovivaio.png" alt="Logo Vivai Carm Giardini">
        </a>
        <ul class="collegamenti">
            <li><a href="/index">Home</a></li>
            <li><a href="/chiSiamo">Chi siamo</a></li>
            <li><a href="/catalogo">Catalogo</a></li>
            <li><a href="/contatti">Contatti</a></li>
        </ul>
        <div class="icone_destra">
            <a href="/login" class="iconaLogin" id="login_selected">
                <img src="/img/utente.png" alt="iconaLogin">
            </a>
            <img src="/img/hamburger.png" alt="Menu" class="menu_hamburger">
        </div>
    </nav>
    <div id="sezione_login">
        <div class="contenitore_login">
            <h2>Login Staff</h2>
            <p class="sottotitolo_login">Vivai Carm Giardini</p>
            
            <form action="/login" method="POST" class="form_login">
                <div class="gruppo_input">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="gruppo_input">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <p id="messaggio_errore"></p>
                <button type="submit" class="btn_accedi">Accedi</button>
            </form>
        </div>
    </div>
    <footer class="footer">
        <div class="footer_parte_sinistra">
            <p class="titolo_footer">Vivai Carm Giardini</p>
            <p>Via Roma 123, Città</p>
        </div>
        <div class="footer_parte_centrale">
            <a href="#"><img src="/img/logofb.png" alt="Facebook"></a>
            <a href="#"><img src="/img/logoInsta.png" alt="Instagram"></a>
        </div>
        <div class="footer_parte_destra">
            <p>P.IVA 01234567890</p>
            <p>Tel: 333 1234567</p>
        </div>
    </footer>
</body>
</html>
