<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anteprima piante</title>
    <link rel="stylesheet" href="./style/stile.css">
    <script src="./script/script.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="index" class="logo">
            <img src="./img/logovivaio.png" alt="Logo Vivai Carm Giardini">
        </a>
        <ul class="collegamenti">
            <li><a href="index" >Home</a></li>
            <li><a href="chiSiamo">Chi siamo</a></li>
            <li><a href="catalogo">Catalogo</a></li>
            <li><a href="contatti">Contatti</a></li>
        </ul>
        <div class="icone_destra">
            <a href="login" class="iconaLogin">
                <img src="./img/utente.png" alt="iconaLogin">
            </a>
            <img src="./img/hamburger.png" alt="Menu" class="menu_hamburger">
        </div>
    </nav>
    <section class="corpo_anteprima">
        
        <div class="anteprima_immagine">
            <img id="pianta_img" src="" alt="Immagine Pianta">
        </div>

        <div class="anteprima_dati">
            <h2 id="pianta_nome">Caricamento...</h2>
            
            <div class="gruppo_visualizzazione">
                <div class="area_descrizione">
                    <label id="titolo_descrizione">Descrizione pianta</label>
                    <div id="pianta_descrizione"></div>
                </div>
            </div>

            <div class="gruppo_visualizzazione">
                <div id="pianta_prezzo_box" class="area_prezzo">
                    <label>prezzo</label>
                    <span id="pianta_prezzo"></span>
                </div>
            </div>

            <div class="blocco_staff">
                <p>Sei dello staff? <a href="/login">Accedi</a> per modificare questa pianta.</p>
            </div>
        </div>

    </section>
    <footer class="footer">
        <div class="footer_parte_sinistra">
            <p class="titolo_footer">Vivai Carm Giardini</p>
            <p>Strada Provinciale Lauretana, 52044 Cortona AR</p>
        </div>
        <div class="footer_parte_centrale">
            <a href="#"><img src="./img/logofb.png" alt="Facebook"></a>
            <a href="#"><img src="./img/logoInsta.png" alt="Instagram"></a>
        </div>
        <div class="footer_parte_destra">
            <p>P.IVA 01234567890</p>
            <p>Tel: 333 1234567</p>
        </div>
    </footer>
</body>
</html>
